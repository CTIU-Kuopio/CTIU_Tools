name: FileSorter
version: 0.0.1
environment_file: environment.yaml
installer_type: all
license_file: LICENSE
welcome_image: app/logo/Logo_high.png
header_image: app/logo/Logo_long.png
icon_image: app/logo/Logo_rect.png
conclusion_text: Thank you! You have successfully installed FileSorter 0.0.1.
keep_pkgs: false
register_python: false
initialize_conda: false
extra_files:
- app/bash_bat_scripts/pre_uninstall.sh: pre_uninstall.sh
- app/bash_bat_scripts/uninstall.sh: uninstall.sh
- app/logo/Logo_rect.icns: FileSorter/Logo_rect.icns
- app/logo/Logo_rect.ico: FileSorter/Logo_rect.ico
- app/logo/Logo_rect.png: FileSorter/Logo_rect.png
- app/menuinst/Welcome.ipynb: FileSorter/notebooks/Welcome.ipynb
- app/menuinst/notebook_launcher.json: FileSorter/notebook_launcher.json
- app/python_scripts/hide_code_cells.py: FileSorter/hide_code_cells.py
- app/python_scripts/include_path.py: FileSorter/include_path.py
- construct.yaml: FileSorter/construct.yaml
- notebooks/notebook_latest_versions.yaml: FileSorter/notebook_latest_versions.yaml
- requirements.txt: FileSorter/requirements.txt
post_install: app/bash_bat_scripts/post_install.bat # [win]
post_install: app/bash_bat_scripts/post_install.sh # [unix]
pre_uninstall: app/bash_bat_scripts/pre_uninstall.bat # [win]
pre_uninstall: app/bash_bat_scripts/pre_uninstall.sh # [unix]
